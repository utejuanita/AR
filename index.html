<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Universal AR Viewer</title>

<style>
html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Arial,sans-serif;
}

#ui{
position:absolute;
top:10px;
left:10px;
z-index:1000;
background:rgba(0,0,0,.7);
padding:10px;
border-radius:10px;
color:white;
max-width:260px;
}

button{
padding:8px 12px;
margin:4px;
cursor:pointer;
}

input[type=range]{
width:180px;
}

canvas{
display:block;
}

#viewerOverlay{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle at center, rgba(30,30,30,.15), rgba(0,0,0,.88));
z-index:900;
pointer-events:none;
opacity:0;
transition:opacity .25s ease;
}

#viewerOverlay.active{
opacity:1;
pointer-events:auto;
}

#viewerCard{
width:min(92vw, 980px);
height:min(82vh, 760px);
background:#111;
border:1px solid rgba(255,255,255,.12);
border-radius:18px;
box-shadow:0 20px 60px rgba(0,0,0,.45);
overflow:hidden;
display:flex;
flex-direction:column;
}

#viewerHeader{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 16px;
background:rgba(255,255,255,.05);
color:#fff;
}

#viewerHeader h2{
margin:0;
font-size:16px;
font-weight:600;
}

#closeViewerBtn{
background:#222;
color:#fff;
border:1px solid rgba(255,255,255,.15);
border-radius:8px;
}

#viewerCanvasWrap{
position:relative;
flex:1;
min-height:320px;
}

#viewerCanvasWrap canvas{
width:100%;
height:100%;
display:block;
}

#viewerHint{
position:absolute;
bottom:14px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,.55);
color:#fff;
padding:8px 12px;
border-radius:999px;
font-size:13px;
pointer-events:none;
white-space:nowrap;
}
</style>
</head>
<body>

<div id="ui">

<input type="file"
       id="fileInput"
       accept=".glb,.gltf">

<br><br>

<button id="screenViewBtn">
3D Ansicht
</button>

<br><br>

<label>Skalierung</label><br>
<input type="range"
       id="scale"
       min="0.1"
       max="5"
       step="0.1"
       value="1">

<br><br>

<label>Rotation</label><br>
<input type="range"
       id="rotation"
       min="0"
       max="360"
       value="0">

<br><br>

<button id="resetBtn">
Reset
</button>

<button id="iosBtn">
AR (iPhone)
</button>

</div>

<div id="viewerOverlay">
  <div id="viewerCard">
    <div id="viewerHeader">
      <h2>3D Objektansicht</h2>
      <button id="closeViewerBtn">Schließen</button>
    </div>
    <div id="viewerCanvasWrap">
      <div id="viewerHint">Ziehen zum Drehen · Mausrad zum Zoomen</div>
    </div>
  </div>
</div>

<script type="importmap">
{
 "imports": {
  "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
 }
}
</script>

<script type="module">

import * as THREE from "three";

import { GLTFLoader }
from "three/addons/loaders/GLTFLoader.js";

import { ARButton }
from "three/addons/webxr/ARButton.js";

import { OrbitControls }
from "three/addons/controls/OrbitControls.js";

const scene = new THREE.Scene();

const camera =
new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.01,
100
);

const renderer =
new THREE.WebGLRenderer({
antialias:true,
alpha:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

renderer.xr.enabled = true;

document.body.appendChild(
renderer.domElement
);

const hemi =
new THREE.HemisphereLight(
0xffffff,
0x444444,
2
);

scene.add(hemi);

const dir =
new THREE.DirectionalLight(
0xffffff,
2
);

dir.position.set(3,5,2);
scene.add(dir);

let model=null;
let screenModel=null;

let reticle;

let hitTestSource=null;
let hitTestSourceRequested=false;

const loader =
new GLTFLoader();

const overlay = document.getElementById("viewerOverlay");
const viewerCanvasWrap = document.getElementById("viewerCanvasWrap");
const screenViewBtn = document.getElementById("screenViewBtn");
const closeViewerBtn = document.getElementById("closeViewerBtn");

const viewerScene = new THREE.Scene();
viewerScene.background = new THREE.Color(0x101010);

const viewerCamera = new THREE.PerspectiveCamera(
45,
1,
0.01,
1000
);
viewerCamera.position.set(0, 1, 3);

const viewerRenderer = new THREE.WebGLRenderer({
antialias:true,
alpha:true
});
viewerRenderer.setPixelRatio(window.devicePixelRatio);
viewerCanvasWrap.appendChild(viewerRenderer.domElement);

const controls = new OrbitControls(
viewerRenderer.domElement,
viewerCamera
);
controls.enableDamping = true;
controls.target.set(0, 0.5, 0);

viewerScene.add(new THREE.AmbientLight(0xffffff, 1.8));
const viewerDirLight = new THREE.DirectionalLight(0xffffff, 2.2);
viewerDirLight.position.set(3, 4, 5);
viewerScene.add(viewerDirLight);
const viewerFillLight = new THREE.DirectionalLight(0xffffff, 1.2);
viewerFillLight.position.set(-4, 2, -2);
viewerScene.add(viewerFillLight);

const viewerGrid = new THREE.GridHelper(10, 10, 0x666666, 0x333333);
viewerGrid.position.y = -0.001;
viewerScene.add(viewerGrid);

function updateViewerSize(){
  const rect = viewerCanvasWrap.getBoundingClientRect();
  const width = Math.max(1, rect.width);
  const height = Math.max(1, rect.height);
  viewerCamera.aspect = width / height;
  viewerCamera.updateProjectionMatrix();
  viewerRenderer.setSize(width, height, false);
}

function fitCameraToObject(object){
  const box = new THREE.Box3().setFromObject(object);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  const fov = viewerCamera.fov * (Math.PI / 180);
  let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
  cameraZ *= 1.8;

  viewerCamera.position.set(center.x, center.y + maxDim * 0.35, center.z + cameraZ);
  viewerCamera.near = Math.max(0.01, maxDim / 100);
  viewerCamera.far = Math.max(1000, maxDim * 20);
  viewerCamera.updateProjectionMatrix();

  controls.target.copy(center);
  controls.minDistance = maxDim * 0.5;
  controls.maxDistance = maxDim * 8;
  controls.update();
}

function syncScreenModelTransform(){
  if(!screenModel || !model) return;
  screenModel.rotation.copy(model.rotation);
  screenModel.scale.copy(model.scale);
}

function showScreenModel(){
  if(!model){
    alert("Bitte zuerst ein 3D-Modell laden.");
    return;
  }

  if(screenModel){
    viewerScene.remove(screenModel);
  }

  screenModel = model.clone(true);
  screenModel.visible = true;
  screenModel.position.set(0,0,0);
  syncScreenModelTransform();
  viewerScene.add(screenModel);
  fitCameraToObject(screenModel);
  updateViewerSize();
  overlay.classList.add("active");
}

function hideScreenModel(){
  overlay.classList.remove("active");
}

screenViewBtn.addEventListener("click", showScreenModel);
closeViewerBtn.addEventListener("click", hideScreenModel);
overlay.addEventListener("click", e=>{
  if(e.target === overlay){
    hideScreenModel();
  }
});

reticle =
new THREE.Mesh(
new THREE.RingGeometry(
0.08,
0.1,
32
).rotateX(-Math.PI/2),

new THREE.MeshBasicMaterial({
color:0x00ff00
})
);

reticle.matrixAutoUpdate=false;
reticle.visible=false;

scene.add(reticle);

function isIOS(){

return /iPad|iPhone|iPod/.test(
navigator.userAgent
) ||
(
navigator.platform==="MacIntel" &&
navigator.maxTouchPoints>1
);

}

function isAndroidAR(){

return navigator.xr;

}

if(isAndroidAR()){

document.body.appendChild(
ARButton.createButton(
renderer,
{
requiredFeatures:["hit-test"]
}
)
);

}

document
.getElementById("fileInput")
.addEventListener(
"change",
e=>{

const file=e.target.files[0];

if(!file) return;

const url=
URL.createObjectURL(file);

loader.load(
url,
gltf=>{

if(model){

scene.remove(model);

}

model=gltf.scene;

model.visible=false;

scene.add(model);

if(screenModel){
  viewerScene.remove(screenModel);
  screenModel = null;
}

URL.revokeObjectURL(url);

}
);

}
);

renderer.domElement.addEventListener(
"click",
()=>{

if(
!model ||
!reticle.visible
) return;

model.visible=true;

model.position.setFromMatrixPosition(
reticle.matrix
);

model.quaternion.setFromRotationMatrix(
reticle.matrix
);

syncScreenModelTransform();

}
);

document
.getElementById("scale")
.addEventListener(
"input",
e=>{

if(!model) return;

const s=
parseFloat(
e.target.value
);

model.scale.set(
s,s,s
);

syncScreenModelTransform();

}
);

document
.getElementById("rotation")
.addEventListener(
"input",
e=>{

if(!model) return;

model.rotation.y=
THREE.MathUtils.degToRad(
e.target.value
);

syncScreenModelTransform();

}
);

document
.getElementById("resetBtn")
.addEventListener(
"click",
()=>{

if(!model) return;

model.position.set(
0,0,0
);

model.rotation.set(
0,0,0
);

model.scale.set(
1,1,1
);

document.getElementById("scale").value = 1;
document.getElementById("rotation").value = 0;

syncScreenModelTransform();
if(screenModel){
  fitCameraToObject(screenModel);
}

}
);

document
.getElementById("iosBtn")
.addEventListener(
"click",
()=>{

if(!isIOS()){

alert(
"Nur für iPhone/iPad"
);

return;

}

window.location.href=
"./model.usdz";

}
);

renderer.setAnimationLoop(
(timestamp,frame)=>{

if(frame){

const session=
renderer.xr.getSession();

const referenceSpace=
renderer.xr.getReferenceSpace();

if(
!hitTestSourceRequested
&& session
){

session
.requestReferenceSpace(
"viewer"
)
.then(viewerSpace=>{

session
.requestHitTestSource({
space:viewerSpace
})
.then(source=>{

hitTestSource=
source;

});

});

session
.addEventListener(
"end",
()=>{

hitTestSourceRequested=false;
hitTestSource=null;

}
);

hitTestSourceRequested=true;

}

if(hitTestSource){

const hits=
frame.getHitTestResults(
hitTestSource
);

if(hits.length){

const hit=
hits[0];

const pose=
hit.getPose(
referenceSpace
);

reticle.visible=true;

reticle.matrix.fromArray(
pose.transform.matrix
);

}else{

reticle.visible=false;

}

}

}

renderer.render(
scene,
camera
);

}
);

function animateViewer(){
  requestAnimationFrame(animateViewer);
  controls.update();
  viewerRenderer.render(viewerScene, viewerCamera);
}
animateViewer();

window.addEventListener(
"resize",
()=>{

camera.aspect=
window.innerWidth/
window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

updateViewerSize();

}
);

updateViewerSize();

</script>

</body>
</html>
