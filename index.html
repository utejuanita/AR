<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Universal AR Viewer</title>

<style>
html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Arial,sans-serif;
}

body{
position:relative;
}

#cameraFeed,
#xrCanvas{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
}

#cameraFeed{
z-index:0;
background:#000;
}

#xrCanvas{
z-index:1;
pointer-events:auto;
}

#ui{
position:absolute;
top:10px;
left:10px;
z-index:1000;
width:min(250px, calc(100vw - 20px));
background:rgba(0,0,0,.72);
padding:10px;
border-radius:14px;
color:white;
backdrop-filter:blur(8px);
box-sizing:border-box;
transition:transform .25s ease, opacity .25s ease, width .25s ease;
transform:translateX(0);
}

#ui.collapsed{
transform:translateX(calc(-100% + 46px));
}

#toggleUiBtn{
position:absolute;
top:10px;
right:10px;
width:28px;
height:28px;
padding:0;
margin:0;
border-radius:999px;
border:1px solid rgba(255,255,255,.2);
background:rgba(255,255,255,.08);
color:#fff;
font-size:18px;
line-height:1;
}

#uiContent{
padding-top:34px;
}

#ui.compact{
width:min(220px, calc(100vw - 20px));
}

button{
padding:8px 12px;
margin:4px;
cursor:pointer;
}

input[type=range]{
width:160px;
max-width:100%;
}

canvas{
display:block;
}

#viewerOverlay{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle at center, rgba(30,30,30,.15), rgba(0,0,0,.45));
z-index:900;
pointer-events:none;
opacity:0;
transition:opacity .25s ease;
}

#viewerOverlay.active{
opacity:1;
pointer-events:auto;
}

#viewerCard{
width:min(94vw, 980px);
height:min(84vh, 760px);
background:rgba(17,17,17,.72);
border:1px solid rgba(255,255,255,.12);
border-radius:18px;
box-shadow:0 20px 60px rgba(0,0,0,.45);
overflow:hidden;
display:flex;
flex-direction:column;
backdrop-filter:blur(10px);
}

#viewerHeader{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 16px;
background:rgba(255,255,255,.05);
color:#fff;
}

#viewerHeader h2{
margin:0;
font-size:16px;
font-weight:600;
}

#closeViewerBtn{
background:#222;
color:#fff;
border:1px solid rgba(255,255,255,.15);
border-radius:8px;
}

#viewerCanvasWrap{
position:relative;
flex:1;
min-height:320px;
}

#viewerCanvasWrap canvas{
width:100%;
height:100%;
display:block;
}

#viewerHint,
#statusBox,
#arStatus{
position:absolute;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,.58);
color:#fff;
padding:8px 12px;
border-radius:999px;
font-size:13px;
pointer-events:none;
white-space:nowrap;
}

#viewerHint{
bottom:14px;
}

#statusBox{
top:14px;
max-width:90%;
overflow:hidden;
text-overflow:ellipsis;
}

#arStatus{
bottom:20px;
z-index:950;
}

@media (max-width: 640px){
  #ui{
    width:min(210px, calc(100vw - 20px));
    padding:8px;
    border-radius:12px;
  }

  #ui.collapsed{
    transform:translateX(calc(-100% + 42px));
  }

  #uiContent{
    padding-top:30px;
    font-size:14px;
  }

  button{
    padding:7px 10px;
    margin:3px;
    font-size:13px;
  }

  input[type=range]{
    width:140px;
  }
}
</style>
</head>
<body>

<video id="cameraFeed" autoplay playsinline muted></video>

<div id="ui" class="compact">
  <button id="toggleUiBtn" aria-label="Menü einklappen">‹</button>
  <div id="uiContent">

    <input type="file"
           id="fileInput"
           accept=".glb,.gltf">

    <br><br>

    <button id="screenViewBtn">
    3D Ansicht
    </button>

    <button id="mixedViewBtn">
    Kamera + 3D
    </button>

    <button id="surfaceAnchorBtn">
    Oberfläche verankern
    </button>

    <br><br>

    <label>Skalierung</label><br>
    <input type="range"
           id="scale"
           min="0.1"
           max="5"
           step="0.1"
           value="1">

    <br><br>

    <label>Rotation</label><br>
    <input type="range"
           id="rotation"
           min="0"
           max="360"
           value="0">

    <br><br>

    <button id="resetBtn">
    Reset
    </button>

    <button id="iosBtn">
    AR (iPhone)
    </button>
  </div>
</div>

<div id="arStatus">Lade ein Modell und starte dann die Oberflächenverankerung.</div>

<div id="viewerOverlay">
  <div id="viewerCard">
    <div id="viewerHeader">
      <h2>3D Objektansicht</h2>
      <button id="closeViewerBtn">Schließen</button>
    </div>
    <div id="viewerCanvasWrap">
      <div id="statusBox">Warte auf Modell …</div>
      <div id="viewerHint">Ziehen zum Drehen · Pinch zum Zoomen</div>
    </div>
  </div>
</div>

<script type="importmap">
{
 "imports": {
  "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
 }
}
</script>

<script type="module">

import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { ARButton } from "three/addons/webxr/ARButton.js";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
70,
window.innerWidth / window.innerHeight,
0.01,
100
);
camera.position.set(0, 0, 2.8);
scene.add(camera);

const renderer = new THREE.WebGLRenderer({
antialias:true,
alpha:true
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
renderer.domElement.id = "xrCanvas";
document.body.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2.2));
const dir = new THREE.DirectionalLight(0xffffff, 2.4);
dir.position.set(3, 5, 2);
scene.add(dir);

let model = null;
let screenModel = null;
let currentObjectURL = null;
let reticle;
let hitTestSource = null;
let hitTestSourceRequested = false;
let mixedModeActive = false;
let cameraStream = null;
let surfaceAnchorMode = false;
let surfacePlaced = false;

const loader = new GLTFLoader();

const overlay = document.getElementById("viewerOverlay");
const viewerCanvasWrap = document.getElementById("viewerCanvasWrap");
const screenViewBtn = document.getElementById("screenViewBtn");
const mixedViewBtn = document.getElementById("mixedViewBtn");
const surfaceAnchorBtn = document.getElementById("surfaceAnchorBtn");
const closeViewerBtn = document.getElementById("closeViewerBtn");
const scaleInput = document.getElementById("scale");
const rotationInput = document.getElementById("rotation");
const statusBox = document.getElementById("statusBox");
const cameraFeed = document.getElementById("cameraFeed");
const ui = document.getElementById("ui");
const toggleUiBtn = document.getElementById("toggleUiBtn");
const arStatus = document.getElementById("arStatus");

const viewerScene = new THREE.Scene();
viewerScene.background = null;

const viewerCamera = new THREE.PerspectiveCamera(45, 1, 0.01, 2000);
viewerCamera.position.set(0, 1, 3);

const viewerRenderer = new THREE.WebGLRenderer({
antialias:true,
alpha:true,
preserveDrawingBuffer:true
});
viewerRenderer.setClearColor(0x000000, 0);
viewerRenderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
viewerCanvasWrap.appendChild(viewerRenderer.domElement);

const controls = new OrbitControls(viewerCamera, viewerRenderer.domElement);
controls.enableDamping = true;
controls.enablePan = false;
controls.target.set(0, 0.5, 0);

viewerScene.add(new THREE.AmbientLight(0xffffff, 2.4));
const viewerDirLight = new THREE.DirectionalLight(0xffffff, 2.5);
viewerDirLight.position.set(3, 4, 5);
viewerScene.add(viewerDirLight);
const viewerFillLight = new THREE.DirectionalLight(0xffffff, 1.6);
viewerFillLight.position.set(-4, 2, -2);
viewerScene.add(viewerFillLight);

const viewerGrid = new THREE.GridHelper(10, 10, 0x666666, 0x333333);
viewerGrid.position.y = -0.001;
viewerScene.add(viewerGrid);

function setStatus(message){
  statusBox.textContent = message;
}

function setARStatus(message){
  arStatus.textContent = message;
}

function toggleUi(){
  const collapsed = ui.classList.toggle("collapsed");
  toggleUiBtn.textContent = collapsed ? "›" : "‹";
  toggleUiBtn.setAttribute("aria-label", collapsed ? "Menü ausklappen" : "Menü einklappen");
}

toggleUiBtn.addEventListener("click", toggleUi);

async function startCameraFeed(){
  if(cameraStream){
    return true;
  }

  try{
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:{ ideal:"environment" }
      },
      audio:false
    });
    cameraFeed.srcObject = cameraStream;
    await cameraFeed.play();
    return true;
  }catch(error){
    console.error("Kamera konnte nicht gestartet werden", error);
    setStatus("Kamera konnte nicht gestartet werden");
    setARStatus("Kein Kamerazugriff verfügbar.");
    alert("Kamerazugriff wurde nicht erlaubt oder ist nicht verfügbar.");
    return false;
  }
}

function updateViewerSize(){
  const rect = viewerCanvasWrap.getBoundingClientRect();
  const width = Math.max(1, rect.width);
  const height = Math.max(1, rect.height);
  viewerCamera.aspect = width / height;
  viewerCamera.updateProjectionMatrix();
  viewerRenderer.setSize(width, height, false);
}

function centerObjectAtGround(object){
  object.updateMatrixWorld(true);
  const box = new THREE.Box3().setFromObject(object);
  const center = box.getCenter(new THREE.Vector3());
  const minY = box.min.y;
  object.position.x -= center.x;
  object.position.y -= minY;
  object.position.z -= center.z;
  object.updateMatrixWorld(true);
}

function normalizeObjectSize(object){
  object.updateMatrixWorld(true);
  const box = new THREE.Box3().setFromObject(object);
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);

  if(!maxDim || !isFinite(maxDim)){
    return 1;
  }

  const targetSize = 1.5;
  const factor = targetSize / maxDim;
  object.scale.multiplyScalar(factor);
  object.updateMatrixWorld(true);
  return factor;
}

function ensureVisibleMaterials(root){
  root.traverse(node=>{
    if(!node.isMesh) return;

    if(Array.isArray(node.material)){
      node.material = node.material.map(material => material || new THREE.MeshStandardMaterial({ color:0xcccccc }));
      node.material.forEach(material => {
        if("side" in material) material.side = THREE.DoubleSide;
        material.transparent = material.opacity < 1;
        material.needsUpdate = true;
      });
    }else{
      if(!node.material){
        node.material = new THREE.MeshStandardMaterial({ color:0xcccccc });
      }
      if("side" in node.material) node.material.side = THREE.DoubleSide;
      node.material.transparent = node.material.opacity < 1;
      node.material.needsUpdate = true;
    }

    if(node.geometry){
      node.geometry.computeBoundingSphere();
      node.geometry.computeVertexNormals();
    }

    node.frustumCulled = false;
  });
}

function fitCameraToObject(object){
  object.updateMatrixWorld(true);
  const box = new THREE.Box3().setFromObject(object);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  const fov = viewerCamera.fov * (Math.PI / 180);
  let cameraZ = Math.abs((maxDim / 2) / Math.tan(fov / 2));
  cameraZ *= 2.4;

  viewerCamera.position.set(center.x, center.y + maxDim * 0.7, center.z + cameraZ);
  viewerCamera.near = Math.max(0.001, maxDim / 1000);
  viewerCamera.far = Math.max(2000, maxDim * 50);
  viewerCamera.updateProjectionMatrix();

  controls.target.copy(center);
  controls.minDistance = Math.max(0.05, maxDim * 0.25);
  controls.maxDistance = Math.max(10, maxDim * 12);
  controls.update();

  setStatus(`Modell geladen · Größe ${size.x.toFixed(2)} × ${size.y.toFixed(2)} × ${size.z.toFixed(2)}`);
}

function syncScreenModelTransform(){
  if(!screenModel || !model) return;
  screenModel.rotation.copy(model.rotation);
}

function rebuildScreenModel(autoOpen=false){
  if(!model){
    return;
  }

  if(screenModel){
    viewerScene.remove(screenModel);
  }

  screenModel = model.clone(true);
  screenModel.visible = true;
  screenModel.position.set(0,0,0);
  screenModel.rotation.set(0,0,0);
  screenModel.scale.set(1,1,1);

  ensureVisibleMaterials(screenModel);
  centerObjectAtGround(screenModel);
  normalizeObjectSize(screenModel);
  centerObjectAtGround(screenModel);

  const sliderScale = parseFloat(scaleInput.value || "1");
  screenModel.scale.multiplyScalar(sliderScale);
  syncScreenModelTransform();

  viewerScene.add(screenModel);
  fitCameraToObject(screenModel);
  updateViewerSize();

  if(autoOpen){
    overlay.classList.add("active");
  }
}

function clearPlacedSurfaceModel(){
  const existing = scene.getObjectByName("surfaceAnchoredModel");
  if(existing){
    scene.remove(existing);
  }
}

function placeModelOnDetectedSurface(){
  if(!model || !reticle.visible){
    setARStatus("Noch keine Oberfläche erkannt. Bewege die Kamera langsam über Boden oder Tisch.");
    return;
  }

  clearPlacedSurfaceModel();

  const anchoredModel = model.clone(true);
  anchoredModel.name = "surfaceAnchoredModel";
  anchoredModel.visible = true;
  anchoredModel.position.set(0,0,0);
  anchoredModel.rotation.set(0,0,0);
  anchoredModel.scale.set(1,1,1);

  ensureVisibleMaterials(anchoredModel);
  centerObjectAtGround(anchoredModel);
  normalizeObjectSize(anchoredModel);
  centerObjectAtGround(anchoredModel);

  const sliderScale = parseFloat(scaleInput.value || "1");
  anchoredModel.scale.multiplyScalar(sliderScale);
  anchoredModel.rotation.y = THREE.MathUtils.degToRad(rotationInput.value || 0);

  anchoredModel.position.setFromMatrixPosition(reticle.matrix);
  anchoredModel.quaternion.setFromRotationMatrix(reticle.matrix);
  anchoredModel.translateY(0.001);

  scene.add(anchoredModel);
  surfacePlaced = true;
  surfaceAnchorMode = false;
  setARStatus("Oberfläche erkannt und Modell verankert. Du kannst jetzt mit der Kamera darum herumgehen.");
}

function rebuildMixedModel(){
  if(!model || surfacePlaced){
    return;
  }

  const existing = scene.getObjectByName("mixedModelRoot");
  if(existing){
    scene.remove(existing);
  }

  const mixedModel = model.clone(true);
  mixedModel.name = "mixedModelRoot";
  mixedModel.visible = true;
  mixedModel.position.set(0, -0.4, -1.8);
  mixedModel.rotation.set(0, 0, 0);
  mixedModel.scale.set(1, 1, 1);

  ensureVisibleMaterials(mixedModel);
  centerObjectAtGround(mixedModel);
  normalizeObjectSize(mixedModel);
  centerObjectAtGround(mixedModel);

  const sliderScale = parseFloat(scaleInput.value || "1");
  mixedModel.scale.multiplyScalar(sliderScale);
  mixedModel.rotation.y = THREE.MathUtils.degToRad(rotationInput.value || 0);

  scene.add(mixedModel);
}

function showScreenModel(){
  if(!model){
    alert("Bitte zuerst ein 3D-Modell laden.");
    return;
  }

  mixedModeActive = false;
  surfaceAnchorMode = false;
  rebuildScreenModel(true);
}

async function showMixedView(){
  if(!model){
    alert("Bitte zuerst ein 3D-Modell laden.");
    return;
  }

  const ok = await startCameraFeed();
  if(!ok){
    return;
  }

  mixedModeActive = true;
  surfaceAnchorMode = false;
  overlay.classList.remove("active");
  if(!surfacePlaced){
    rebuildMixedModel();
  }
  setARStatus("Kamerabild mit 3D-Modell aktiv");
}

async function startSurfaceAnchorMode(){
  if(!model){
    alert("Bitte zuerst ein 3D-Modell laden.");
    return;
  }

  const ok = await startCameraFeed();
  if(!ok){
    return;
  }

  mixedModeActive = false;
  surfacePlaced = false;
  surfaceAnchorMode = true;
  overlay.classList.remove("active");
  clearPlacedSurfaceModel();

  const existingMixed = scene.getObjectByName("mixedModelRoot");
  if(existingMixed){
    scene.remove(existingMixed);
  }

  setARStatus("Suche Oberfläche … Bewege die Kamera langsam. Tippe dann ins Bild, um das Modell zu verankern.");
}

function hideScreenModel(){
  overlay.classList.remove("active");
}

screenViewBtn.addEventListener("click", showScreenModel);
mixedViewBtn.addEventListener("click", showMixedView);
surfaceAnchorBtn.addEventListener("click", startSurfaceAnchorMode);
closeViewerBtn.addEventListener("click", hideScreenModel);
overlay.addEventListener("click", e=>{
  if(e.target === overlay){
    hideScreenModel();
  }
});

reticle = new THREE.Mesh(
  new THREE.RingGeometry(0.08, 0.1, 32).rotateX(-Math.PI / 2),
  new THREE.MeshBasicMaterial({ color:0x00ff00 })
);
reticle.matrixAutoUpdate = false;
reticle.visible = false;
scene.add(reticle);

function isIOS(){
  return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
    (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
}

function isAndroidAR(){
  return navigator.xr;
}

if(isAndroidAR()){
  document.body.appendChild(
    ARButton.createButton(renderer, {
      requiredFeatures:["hit-test"]
    })
  );
}

document.getElementById("fileInput").addEventListener("change", e=>{
  const file = e.target.files[0];
  if(!file) return;

  setStatus(`Lade ${file.name} …`);
  overlay.classList.add("active");
  setARStatus("Modell geladen. Wähle jetzt eine Ansicht oder Oberflächenverankerung.");

  if(currentObjectURL){
    URL.revokeObjectURL(currentObjectURL);
  }

  const url = URL.createObjectURL(file);
  currentObjectURL = url;

  loader.load(
    url,
    gltf=>{
      if(model){
        scene.remove(model);
      }

      clearPlacedSurfaceModel();

      const oldMixed = scene.getObjectByName("mixedModelRoot");
      if(oldMixed){
        scene.remove(oldMixed);
      }

      model = gltf.scene;
      model.visible = false;
      scene.add(model);

      surfacePlaced = false;
      rebuildScreenModel(true);
      if(mixedModeActive){
        rebuildMixedModel();
      }
    },
    undefined,
    error=>{
      console.error("Fehler beim Laden des 3D-Modells", error);
      setStatus("Fehler beim Laden des Modells");
      setARStatus("Modell konnte nicht geladen werden.");
      alert("Das 3D-Modell konnte nicht geladen werden.");
    }
  );
});

renderer.domElement.addEventListener("click", ()=>{
  if(surfaceAnchorMode){
    placeModelOnDetectedSurface();
    return;
  }

  if(mixedModeActive){
    return;
  }

  if(!model || !reticle.visible) return;

  model.visible = true;
  model.position.setFromMatrixPosition(reticle.matrix);
  model.quaternion.setFromRotationMatrix(reticle.matrix);
  syncScreenModelTransform();
});

scaleInput.addEventListener("input", e=>{
  if(!model) return;

  const s = parseFloat(e.target.value);
  model.scale.set(s, s, s);

  if(screenModel){
    rebuildScreenModel(overlay.classList.contains("active"));
  }

  if(mixedModeActive){
    rebuildMixedModel();
  }

  if(surfacePlaced){
    const anchored = scene.getObjectByName("surfaceAnchoredModel");
    if(anchored){
      anchored.scale.multiplyScalar(0 + 1);
    }
    clearPlacedSurfaceModel();
    placeModelOnDetectedSurface();
  }
});

rotationInput.addEventListener("input", e=>{
  if(!model) return;

  model.rotation.y = THREE.MathUtils.degToRad(e.target.value);
  syncScreenModelTransform();

  if(mixedModeActive){
    rebuildMixedModel();
  }

  if(surfacePlaced){
    const anchored = scene.getObjectByName("surfaceAnchoredModel");
    if(anchored){
      anchored.rotation.y = THREE.MathUtils.degToRad(e.target.value);
    }
  }
});

document.getElementById("resetBtn").addEventListener("click", ()=>{
  if(!model) return;

  model.position.set(0,0,0);
  model.rotation.set(0,0,0);
  model.scale.set(1,1,1);

  scaleInput.value = 1;
  rotationInput.value = 0;

  clearPlacedSurfaceModel();
  surfacePlaced = false;
  surfaceAnchorMode = false;

  if(screenModel){
    rebuildScreenModel(overlay.classList.contains("active"));
  }

  if(mixedModeActive){
    rebuildMixedModel();
  }

  setARStatus("Zurückgesetzt. Du kannst die Oberflächenverankerung neu starten.");
});

document.getElementById("iosBtn").addEventListener("click", ()=>{
  if(!isIOS()){
    alert("Nur für iPhone/iPad");
    return;
  }

  window.location.href = "./model.usdz";
});

renderer.setAnimationLoop((timestamp, frame)=>{
  if(frame){
    const session = renderer.xr.getSession();
    const referenceSpace = renderer.xr.getReferenceSpace();

    if(!hitTestSourceRequested && session){
      session.requestReferenceSpace("viewer").then(viewerSpace=>{
        session.requestHitTestSource({ space:viewerSpace }).then(source=>{
          hitTestSource = source;
        });
      });

      session.addEventListener("end", ()=>{
        hitTestSourceRequested = false;
        hitTestSource = null;
        reticle.visible = false;
        surfaceAnchorMode = false;
        setARStatus("AR-Sitzung beendet.");
      });

      hitTestSourceRequested = true;
    }

    if(hitTestSource){
      const hits = frame.getHitTestResults(hitTestSource);

      if(hits.length){
        const hit = hits[0];
        const pose = hit.getPose(referenceSpace);
        reticle.visible = true;
        reticle.matrix.fromArray(pose.transform.matrix);

        if(surfaceAnchorMode && !surfacePlaced){
          setARStatus("Oberfläche erkannt. Tippe jetzt ins Bild, um das Modell dort zu verankern.");
        }
      }else{
        reticle.visible = false;

        if(surfaceAnchorMode && !surfacePlaced){
          setARStatus("Suche Oberfläche … Bewege die Kamera langsam über Boden oder Tisch.");
        }
      }
    }
  }

  reticle.visible = surfaceAnchorMode && !surfacePlaced && reticle.visible;
  renderer.render(scene, camera);
});

function animateViewer(){
  requestAnimationFrame(animateViewer);
  controls.update();
  viewerRenderer.render(viewerScene, viewerCamera);
}
animateViewer();

window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  updateViewerSize();
});

updateViewerSize();
setStatus("Warte auf Modell …");
setARStatus("Lade ein Modell und starte dann die Oberflächenverankerung.");

</script>

</body>
</html>
